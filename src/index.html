<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
  <meta charset="UTF-8">
  <title>Эль-Гамаль Шифратор</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Криптосистема Эль-Гамаля</h1>
</header>

<main>
  <section class="card">
    <h2 class="card-title">Параметры алгоритма</h2>
    <div class="params-grid">
      <div class="form-group">
        <label for="inputP">
          Простое число <strong>p</strong>
          <span class="hint-inline">(простое, 256 &lt; p &lt; 65536)</span>
        </label>
        <input type="number" id="inputP" class="mono" placeholder="Например: 257" min="3" autocomplete="off">
        <span class="field-hint" id="hintP"></span>
      </div>

      <div class="form-group">
        <label for="inputX">
          Закрытый ключ <strong>x</strong>
          <span class="hint-inline">(1 &lt; x &lt; p−1)</span>
        </label>
        <input type="number" id="inputX" class="mono" placeholder="Например: 53" min="2" autocomplete="off">
        <span class="field-hint" id="hintX"></span>
      </div>

      <div class="form-group">
        <label for="inputK">
          Случайный ключ <strong>k</strong> (для 1-го блока)
          <span class="hint-inline">(1 &lt; k &lt; p−1, взаимно простое с p−1)</span>
        </label>
        <input type="number" id="inputK" class="mono" placeholder="Например: 17" min="2" autocomplete="off">
        <span class="field-hint" id="hintK"></span>
      </div>
    </div>

    <div class="form-group">
      <button id="btnFindRoots" type="button" class="btn-secondary">Найти все первообразные корни по модулю p</button>
    </div>

    <div id="rootsPanel" class="roots-panel hidden">
      <div class="roots-header">
        <span class="roots-label">Первообразные корни по модулю p</span>
        <span class="roots-badge" id="rootsCount"></span>
      </div>
      <div id="rootsList" class="roots-list mono"></div>
      <div class="form-group" style="margin-top:12px;">
        <label for="selectG">Выберите <strong>g</strong></label>
        <select id="selectG" class="mono">
          <option value="">Выберите g</option>
        </select>
        <span class="field-hint" id="hintG"></span>
      </div>
    </div>

    <div id="pubKeyPanel" class="pubkey-panel hidden">
      <span class="pubkey-label">Ключи:</span>
      <span class="pubkey-val mono" id="pubKeyDisplay"></span>
    </div>
  </section>

  <section class="card">
    <h2 class="card-title">Исходный файл</h2>
    <div class="file-row">
      <button id="btnOpen" type="button" class="btn-secondary">Открыть файл</button>
      <span class="file-name" id="fileName">Файл не выбран</span>
      <input type="file" id="fileInput" style="display:none">
    </div>
  </section>

  <div class="btn-group">
    <button id="btnEncrypt" type="button" class="btn-primary">Зашифровать</button>
    <button id="btnDecrypt" type="button" class="btn-primary btn-decrypt">Расшифровать</button>
  </div>

  <section class="card" id="outputSection" style="display:none;">
    <h2 class="card-title">Результат шифрования (десятичные числа)</h2>
    <div class="binary-panel">
      <div class="binary-block">
        <div class="binary-header">
          <span class="binary-label">Значения <strong>a</strong></span>
          <span class="binary-badge source-badge">a = g<sup>k</sup> mod p</span>
        </div>
        <textarea id="outA" class="binary-area mono" readonly></textarea>
      </div>
      <div class="binary-block">
        <div class="binary-header">
          <span class="binary-label">Значения <strong>b</strong></span>
          <span class="binary-badge key-badge">b = y<sup>k</sup> · m mod p</span>
        </div>
        <textarea id="outB" class="binary-area mono" readonly></textarea>
      </div>
    </div>
    <div class="btn-group" style="margin-top:16px;">
      <button id="btnSaveEnc" type="button" class="btn-secondary">Сохранить зашифрованный файл</button>
    </div>
  </section>

  <section class="card" id="decryptSection" style="display:none;">
    <h2 class="card-title">Результат расшифровки</h2>
    <div class="binary-panel">
      <div class="binary-block" style="flex:1;">
        <div class="binary-header">
          <span class="binary-label">Расшифрованные байты (десятичные)</span>
          <span class="binary-badge result-badge">m = b · a<sup>−x</sup> mod p</span>
        </div>
        <textarea id="outDecrypted" class="binary-area mono" readonly></textarea>
      </div>
    </div>
    <div class="btn-group" style="margin-top:16px;">
      <button id="btnSaveDec" type="button" class="btn-secondary">Сохранить расшифрованный файл</button>
    </div>
  </section>
</main>

<div id="toast"></div>
<script src="index.js"></script>
</body>
</html>
